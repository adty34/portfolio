<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aditya | Forms</title>
  <link rel="stylesheet" href="quries.css" />
</head>
<body>

  <div class="wrapper">

    <header>
      <h4>Get in Touch</h4>
      <p>Fill out the form and I'll get back to you.</p>
    </header>

    <div class="card">
      <form id="contactForm" novalidate>

        <div class="field">
          <label for="user_name">Full Name</label>
          <input id="user_name" name="user_name" type="text"  required />
        </div>

        <div class="field">
          <label for="user_email">Email Address</label>
          <input id="user_email" name="user_email" type="email"  required />
        </div>

        <div class="field">
          <label for="user_phone">Phone Number</label>
          <input id="user_phone" name="user_phone" type="tel" placeholder="+91 98765 43210" required />
        </div>

        <div class="field">
          <label for="query_type">Query Type</label>
          <div class="select-wrap">
            <select id="query_type" name="query_type" required>
              <option value="" disabled selected>Select an option</option>
              <option value="Fluent English">Fluent English</option>
              <option value="Creative Interfaces (UI/UX)">Creative Interfaces (UI/UX)</option>
              <option value="Level Up Your Life">Level Up Your Life</option>
              <option value="Master Of Communication">Master Of Communication</option>
            </select>
          </div>
        </div>

        <button class="btn-submit" type="submit">Send Message</button>

      </form>
    </div>

  </div>

</body>
</html>
