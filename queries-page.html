<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aditya | Forms</title>
 
</head>
<body>
  <style>
/* ── Reset ── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ── Variables ── */
:root {
  --black:     #000000;
  --off-white: #f5f5f7;
  --grey:      #6e6e73;
  --card-bg:   #111111;
  --input-bg:  #1c1c1e;
  --border:    #2c2c2e;
  --radius:    14px;
  --ease:      cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── Base ── */
html, body {
  height: 100%;
  background: var(--black);
  color: var(--off-white);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
               "Segoe UI", Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.wrapper {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
}

/* ── Header ── */
header {
  text-align: center;
  margin-bottom: 40px;
  animation: fadeDown 0.7s var(--ease) both;
}

header h4 {
  font-size: clamp(28px, 5vw, 42px);
  font-weight: 600;
  letter-spacing: -0.5px;
  color: var(--off-white);
}

header p {
  margin-top: 8px;
  font-size: 15px;
  color: var(--grey);
}

/* ── Card ── */
.card {
  width: 100%;
  max-width: 480px;
  background: var(--card-bg);
  border: 1px solid #222;
  border-radius: 20px;
  padding: 40px 36px;
  animation: fadeUp 0.7s var(--ease) 0.1s both;
}

/* ── Fields ── */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 20px;
}

.field:nth-child(1) { animation: fadeUp 0.5s var(--ease) 0.25s both; }
.field:nth-child(2) { animation: fadeUp 0.5s var(--ease) 0.35s both; }
.field:nth-child(3) { animation: fadeUp 0.5s var(--ease) 0.45s both; }
.field:nth-child(4) { animation: fadeUp 0.5s var(--ease) 0.55s both; }

label {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--grey);
}

input,
select {
  width: 100%;
  padding: 14px 16px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--off-white);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease);
}

input::placeholder {
  color: #48484a;
}

input:focus,
select:focus {
  border-color: var(--off-white);
  box-shadow: 0 0 0 3px rgba(245, 245, 247, 0.08);
}

/* ── Select Arrow ── */
.select-wrap {
  position: relative;
}

.select-wrap::after {
  content: "";
  pointer-events: none;
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 10px;
  height: 6px;
  background: var(--grey);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
}

select option {
  background: var(--input-bg);
}

/* ── Button ── */
.btn-submit {
  width: 100%;
  margin-top: 8px;
  padding: 15px;
  background: var(--off-white);
  color: var(--black);
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  animation: fadeUp 0.5s var(--ease) 0.65s both;
  transition: background 0.3s, transform 0.2s;
}

.btn-submit:hover {
  background: #e0e0e2;
  transform: scale(1.015);
}

.btn-submit:active {
  transform: scale(0.98);
}

/* ── Animations ── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-18px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}</style>

  <div class="wrapper">

    <header>
      <h4>Get in Touch</h4>
      <p>Fill out the form and I'll get back to you.</p>
    </header>

    <div class="card">
      <form id="contactForm" novalidate>

        <div class="field">
          <label for="user_name">Full Name</label>
          <input id="user_name" name="user_name" type="text"  placeholder="Name"   required />
        </div>

        <div class="field">
          <label for="user_email">E-mail Address</label>
          <input id="user_email" name="user_email" type="email" placeholder="E-Mail " required />
        </div>

        <div class="field">
          <label for="user_phone">Phone Number</label>
          <input id="user_phone" name="user_phone" type="tel" placeholder="+91 98765 43210" required />
        </div>

        <div class="field">
          <label for="query_type">Query Type</label>
          <div class="select-wrap">
            <select id="query_type" name="query_type" required>
              <option value="" disabled selected>Select an option</option>
              <option value="Fluent English">Fluent English</option>
              <option value="Creative Interfaces (UI/UX)">Creative Interfaces (UI/UX)</option>
              <option value="Level Up Your Life">Level Up Your Life</option>
              <option value="Master Of Communication">Master Of Communication</option>
            </select>
          </div>
        </div>

        <button class="btn-submit" type="submit">Send </button>

      </form>
    </div>

  </div>

</body>
</html>
